    <style>
        /* Base Styles */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
        }

        /* Navigation & Header */
        nav {
            background-color: #0033a0;
            padding: 20px;
            color: #ffcc00;
        }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .nav-links { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        /* Heading Styles */
        .section-title {
            font-size: 28px;
            background-color: #002b80;
            color: #ffcc00;
            padding: 15px;
            margin: 20px auto;
            width: 80%;
            border: 4px solid black;
            outline: #4CAF50 solid 2px;
        }

        /* Gallery Grid System */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.03); /* Slight zoom when hovering */
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover; /* Crops images to fit the box perfectly */
            border-radius: 5px;
        }

        .gallery-item p {
            margin-top: 10px;
            font-weight: bold;
            color: #0033a0;
        }

        /* Music Controls */
        .audio-player { margin: 20px; }
    </style>
</head>
